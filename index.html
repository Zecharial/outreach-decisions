html { background: var(--bg); }
body {
  direction: rtl;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;

}
.wrap { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }
header.top {

  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 14px 0 12px;
  margin-bottom: 20px;
}
.top-inner { max-width: 860px; margin: 0 auto; padding: 0 20px; }
h1 { font-size: 1.25rem; margin: 0 0 2px; font-weight: 700; letter-spacing: -0.01em; }
.subtitle { color: var(--muted); font-size: 0.85rem; margin: 0 0 10px; }
.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.bar { flex: 1; height: 6px; border-radius: 3px; background: var(--surface-2); overflow: hidden; }
.bar > div { height: 100%; background: var(--accent); width: 0%; transition: width .25s ease; }
.count { font-size: 0.85rem; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.tabs { display: flex; gap: 4px; background: var(--surface-2); border-radius: 8px; padding: 3px; }
.tabs button {

}
.tabs button[aria-pressed="true"] { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); font-weight: 600; }
.search {

.search:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
.export-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

.export-row button:hover { border-color: var(--accent); color: var(--accent); }
.card {

  transition: opacity .2s ease;
}
.card.decided-again { border-inline-start: 4px solid var(--go); padding-inline-start: 15px; }
.card.decided-skip { border-inline-start: 4px solid var(--skip); padding-inline-start: 15px; opacity: .78; }
.card-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.card-head h2 { font-size: 1.02rem; margin: 0; font-weight: 700; }
.sysname { color: var(--muted); font-size: 0.78rem; }
.chip {
  display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 1px 9px;
  border-radius: 99px; white-space: nowrap;
}
.chip.donate { color: var(--chip-donate); background: var(--chip-donate-bg); }
.chip.adopt  { color: var(--chip-adopt);  background: var(--chip-adopt-bg); }
.chip.meet   { color: var(--chip-meet);   background: var(--chip-meet-bg); }
.chip.reach  { color: var(--chip-reach);  background: var(--chip-reach-bg); }
.chip.closed { color: var(--chip-closed); background: var(--chip-closed-bg); }
.meta { color: var(--muted); font-size: 0.8rem; margin: 4px 0 0; display: flex; flex-wrap: wrap; gap: 4px 14px; font-variant-numeric: tabular-nums; }
.meta b { color: var(--ink); font-weight: 600; }
.activity {
  background: var(--surface-2); border-radius: 8px; padding: 9px 12px;
  font-size: 0.84rem; margin-top: 10px; color: var(--ink); white-space: pre-wrap; word-break: break-word;
}
.activity .when { color: var(--muted); font-size: 0.76rem; display: block; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
.no-activity { color: var(--muted); font-size: 0.8rem; margin-top: 10px; font-style: italic; }
.actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
.actions button {
  font: inherit; font-size: 0.88rem; font-weight: 600; border-radius: 9px; cursor: pointer;
  padding: 7px 18px; border: 1px solid transparent;
}
button.again { background: var(--go); color: #fff; }
button.again:hover { filter: brightness(1.08); }
button.skip { background: var(--skip-bg); color: var(--skip); border-color: var(--line); }
button.skip:hover { filter: brightness(.97); }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.verdict { display: flex; gap: 10px; align-items: center; margin-top: 12px; font-size: 0.85rem; font-weight: 600; }
.verdict.again { color: var(--go); }
.verdict.skip { color: var(--skip); }
.undo {
  font: inherit; font-size: 0.76rem; border: 0; background: none; color: var(--muted);
  cursor: pointer; text-decoration: underline; padding: 0;
}
.undo:hover { color: var(--accent); }
.empty { text-align: center; color: var(--muted); padding: 60px 0 30px; font-size: 0.9rem; }
.done-banner {
  background: var(--go-bg); color: var(--go); border-radius: 12px; padding: 14px 18px;

.toast {
  position: fixed; bottom: 22px; inset-inline-start: 50%; transform: translateX(50%);
  background: var(--ink); color: var(--bg); font-size: 0.84rem; padding: 8px 18px;

}
.toast.show { opacity: 1; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

const STORE = 'https://jsonblob.com/api/jsonBlob/019f8576-8bb7-7f63-9053-1816b5576080';

let decisions = {};   // company name -> 'again' | 'skip'
let loaded = false;
let saving = {};
let filter = 'pending';
let query = '';

const CHIP_CLASS = {
  'תרומה': 'donate', 'מאמצות': 'adopt', 'תואמה פגישה': 'meet',
  'פנינו': 'reach', 'בתהליך': 'reach', 'לא ענו (סגור)': 'closed'
};

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function relDate(s) {
  const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s);
  if (!m) return '';
  const d = new Date(+m[3], +m[2] - 1, +m[1]);
  const years = (Date.now() - d.getTime()) / (365.25 * 24 * 3600 * 1000);
  if (years < 1) { const mo = Math.max(1, Math.round(years * 12)); return 'לפני כ־' + mo + ' חודשים'; }
  const y = Math.round(years * 10) / 10;
  return 'לפני ' + (y >= 2 ? Math.round(y) + ' שנים' : 'כשנה');
}

function chipHtml(status) {
  if (!status) return '';
  return status.split(' / ').map(s => {
    const cls = CHIP_CLASS[s] || 'closed';
    return '<span class="chip ' + cls + '">' + esc(s) + '</span>';
  }).join(' ');
}

function setSync(msg, isError) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.style.color = isError ? 'var(--skip)' : '';
}

function render() {
  const list = document.getElementById('list');
  const decidedCount = DATA.filter(c => decisions[c.name]).length;
  const againCount = DATA.filter(c => decisions[c.name] === 'again').length;
  const skipCount = DATA.filter(c => decisions[c.name] === 'skip').length;

  document.getElementById('counter').textContent = decidedCount + ' מתוך ' + DATA.length;
  document.getElementById('barfill').style.width = (100 * decidedCount / DATA.length) + '%';

  const banner = document.getElementById('doneBanner');
  if (loaded && decidedCount === DATA.length) {
    banner.style.display = 'block';
    banner.textContent = 'סיימת! ' + againCount + ' חברות לפנייה מחודשת, ' + skipCount + ' להתעלמות.';
  } else { banner.style.display = 'none'; }

  const q = query.trim();
  const visible = DATA.filter(c => {
    const d = decisions[c.name];
    if (filter === 'pending' && d) return false;
    if (filter === 'again' && d !== 'again') return false;
    if (filter === 'skip' && d !== 'skip') return false;
    if (q && !(c.name + ' ' + c.sysName).includes(q)) return false;
    return true;
  });

  const empty = document.getElementById('empty');
  if (!visible.length) {
    empty.style.display = 'block';
    empty.textContent = !loaded ? 'טוען החלטות…' :
      q ? 'לא נמצאו חברות תואמות לחיפוש.' :
      filter === 'pending' ? 'אין חברות שממתינות להחלטה 🎉' : 'אין עדיין חברות ברשימה הזו.';
  } else { empty.style.display = 'none'; }

  list.innerHTML = visible.map(c => {
    const d = decisions[c.name];
    const busy = saving[c.name];
    const meta = [];
    if (c.sector) meta.push('מגזר: <b>' + esc(c.sector) + '</b>');
    if (c.branch) meta.push('ענף: <b>' + esc(c.branch) + '</b>');
    if (c.revenue) meta.push('מחזור 2024: <b>' + esc(c.revenue) + ' מ׳ ₪</b>');
    if (c.employees) meta.push('מועסקים: <b>' + esc(c.employees) + '</b>');
    const activity = c.activity
      ? '<div class="activity"><span class="when">פעילות אחרונה' + (c.lastDate ? ' · ' + esc(c.lastDate) + (relDate(c.lastDate) ? ' (' + relDate(c.lastDate) + ')' : '') : '') + '</span>' + esc(c.activity) + '</div>'
      : '<p class="no-activity">אין תיעוד פעילות במערכת.</p>';
    let footer;
    if (!loaded) {
      footer = '<div class="actions"><span class="no-activity">טוען…</span></div>';
    } else if (busy) {
      footer = '<div class="verdict">שומר…</div>';
    } else if (!d) {
      footer = '<div class="actions">' +
          '<button class="again" data-act="again" data-name="' + esc(c.name) + '">לפנות שוב</button>' +
          '<button class="skip" data-act="skip" data-name="' + esc(c.name) + '">להתעלם</button>' +
        '</div>';
    } else {
      footer = '<div class="verdict ' + d + '">' + (d === 'again' ? '✓ מסומנת לפנייה מחודשת' : '✕ מסומנת להתעלמות') +
          ' <button class="undo" data-act="pending" data-name="' + esc(c.name) + '">ביטול</button></div>';
    }
    return '<article class="card' + (d ? ' decided-' + d : '') + '">' +
      '<div class="card-head"><h2>' + esc(c.name) + '</h2>' +
      (c.sysName && c.sysName !== c.name ? '<span class="sysname">במערכת: ' + esc(c.sysName) + '</span>' : '') +
      chipHtml(c.status) + '</div>' +
      (meta.length ? '<p class="meta">' + meta.join('') + '</p>' : '') +
      activity + footer + '</article>';
  }).join('');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2600);
}

async function fetchStore() {
  const r = await fetch(STORE, { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function load(silent) {
  try {
    const data = await fetchStore();
    decisions = (data && data.decisions) || {};
    loaded = true;
    setSync('מסונכרן ✓ ההחלטות נשמרות בענן');
    render();
  } catch (e) {
    if (!silent) setSync('לא הצלחתי לטעון את ההחלטות — בדוק חיבור לאינטרנט ורענן.', true);
  }
}

async function decide(name, state) {
  if (saving[name] || !loaded) return;
  const prev = decisions[name];
  saving[name] = true;
  if (state === 'pending') delete decisions[name]; else decisions[name] = state;
  render();
  try {
    const latest = await fetchStore();
    const merged = (latest && latest.decisions) || {};
    if (state === 'pending') delete merged[name]; else merged[name] = state;
    const w = await fetch(STORE, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ decisions: merged, updatedAt: Date.now() })
    });
    if (!w.ok) throw new Error('HTTP ' + w.status);
    decisions = merged;
    delete saving[name];
    render();
  } catch (e) {
    if (prev === undefined) delete decisions[name]; else decisions[name] = prev;
    delete saving[name];
    render();
    toast('השמירה נכשלה — נסה שוב');
  }
}

document.getElementById('list').addEventListener('click', e => {
  const btn = e.target.closest('button[data-act]');
  if (!btn) return;
  decide(btn.dataset.name, btn.dataset.act);
});

document.getElementById('tabs').addEventListener('click', e => {
  const b = e.target.closest('button[data-f]');
  if (!b) return;
  filter = b.dataset.f;
  document.querySelectorAll('#tabs button').forEach(x => x.setAttribute('aria-pressed', x === b ? 'true' : 'false'));
  render();
});

document.getElementById('search').addEventListener('input', e => { query = e.target.value; render(); });

document.getElementById('copyAgain').addEventListener('click', () => {
  const names = DATA.filter(c => decisions[c.name] === 'again').map(c => c.name);
  if (!names.length) { toast('עוד לא סומנו חברות לפנייה מחודשת'); return; }
  navigator.clipboard.writeText(names.join('\n')).then(
    () => toast('הועתקו ' + names.length + ' חברות'),
    () => toast('ההעתקה נכשלה — נסה שוב'));
});

document.getElementById('dlCsv').addEventListener('click', () => {
  const rows = [['שם החברה','שם במערכת','סטטוס במאגר','תאריך פנייה אחרון','החלטה']];
  DATA.forEach(c => {
    const d = decisions[c.name];
    rows.push([c.name, c.sysName, c.status, c.lastDate, d === 'again' ? 'לפנות שוב' : d === 'skip' ? 'להתעלם' : 'טרם הוחלט']);
  });
  const csv = '﻿' + rows.map(r => r.map(x => '"' + String(x).replace(/"/g, '""') + '"').join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = 'החלטות פנייה מחודשת.csv';
  a.click();
  URL.revokeObjectURL(a.href);
});

setSync('טוען החלטות…');
render();
load(false);
setInterval(() => { if (Object.keys(saving).length === 0) load(true); }, 30000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(true); });
</script>
